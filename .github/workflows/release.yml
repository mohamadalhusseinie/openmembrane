name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Create Release PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false'
        working-directory: apps/mcp-server
        run: |
          rm -f "$NPM_CONFIG_USERCONFIG"
          unset NPM_CONFIG_USERCONFIG NODE_AUTH_TOKEN
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view openmembrain version 2>/dev/null || echo "none")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "Publishing openmembrain@$CURRENT (npm has $PUBLISHED)"
            npm publish --provenance --access public
          else
            echo "openmembrain@$CURRENT already published, skipping"
          fi

      - name: Enable auto-merge on version PR
        if: steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.pullRequestNumber != ''
        run: gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
